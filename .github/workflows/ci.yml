on:
    workflow_dispatch:
    push:
        branches:
            - main

permissions:
    contents: read
    pages: write
    id-token: write

name: Build and Deploy
jobs:
    setup:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
        env:
            PRIVATE_PAGE_SALT: ${{ secrets.PRIVATE_PAGE_SALT }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Install git-crypt
              run: sudo apt-get update && sudo apt-get install -y git-crypt
            - name: Restore git-crypt key
              run: printf '%s' "$GIT_CRYPT_KEY_B64" | base64 -d > /tmp/git-crypt-key
              env:
                  GIT_CRYPT_KEY_B64: ${{ secrets.GIT_CRYPT_KEY_B64 }}
            - name: Unlock private content
              run: git-crypt unlock /tmp/git-crypt-key
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: true
            - name: Build astro starlight site
              run: pnpm build
            - name: Print private page URLs
              run: node scripts/print-private-urls.mjs
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3.0.1
              with:
                  path: dist
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: setup
        runs-on: ubuntu-latest
        name: Deploy to Pages
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
